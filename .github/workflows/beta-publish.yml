name: Beta Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to publish (e.g., worma)'
        required: true
        type: string
      tag:
        description: 'npm dist-tag (e.g., beta, next, alpha)'
        required: true
        type: string
        default: beta

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build package
        run: pnpm --filter "${{ inputs.package }}" build

      - name: Publish to npm
        run: pnpm --filter "${{ inputs.package }}" publish --tag "${{ inputs.tag }}" --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ALOVA_PUBLISH_TOKEN }}
